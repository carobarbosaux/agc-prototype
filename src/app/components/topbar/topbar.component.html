<header
  class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-5"
  style="height:56px;background:#FFFFFF;border-bottom:1px solid #E5E7EB;font-family:'Proeduca Sans',system-ui,sans-serif"
>
  <!-- Left: logo + divider + breadcrumb -->
  <div class="flex items-center gap-2">
    <div
      class="flex items-center mr-3"
      [style.cursor]="logoClick.observed ? 'pointer' : 'default'"
      (click)="logoClick.emit()"
    >
      <prodi-wordmark [height]="28" />
    </div>

    <div class="w-px h-4 bg-slate-200 mr-1"></div>

    <nav class="flex items-center gap-1">
      @for (item of breadcrumb; track item.label; let i = $index) {
        <div class="flex items-center gap-1">
          @if (i > 0) {
            <ph-icon name="CaretRight" [size]="12" style="color:#94A3B8" />
          }
          @if (item.onClick || item.route) {
            <button
              class="text-sm transition-colors bg-transparent border-0 p-0 cursor-pointer"
              [style.color]="breadcrumbHover[i] ? '#1A1A1A' : '#4B5563'"
              (click)="onBreadcrumbClick(item)"
              (mouseenter)="breadcrumbHover[i] = true"
              (mouseleave)="breadcrumbHover[i] = false"
            >
              {{ item.label }}
            </button>
          } @else {
            <span class="text-sm font-medium" style="color:#1A1A1A">{{ item.label }}</span>
          }
        </div>
      }
    </nav>
  </div>

  <!-- Right: role selector + bell + avatar -->
  <div class="flex items-center gap-3">

    <!-- Role selector -->
    <div class="relative">
      <button
        class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all border cursor-pointer"
        [ngStyle]="getRolButtonStyle()"
        (click)="rolMenuAbierto.set(!rolMenuAbierto())"
        (mouseenter)="rolBtnHover = true"
        (mouseleave)="rolBtnHover = false"
      >
        <span>{{ rolActualLabel }}</span>
        <ph-icon name="CaretDown" [size]="12" />
      </button>

      @if (rolMenuAbierto()) {
        <div
          class="absolute right-0 top-full mt-1 w-52 rounded-xl shadow-xl py-1 z-50"
          style="background:#FFFFFF;border:1px solid #E5E7EB"
        >
          <div class="px-3 py-2 mb-1" style="border-bottom:1px solid #F1F5F9">
            <p class="text-xs font-medium" style="color:#4B5563">Vista de demo — cambiar rol</p>
          </div>
          @for (rol of roles; track rol.id) {
            <button
              class="w-full text-left px-3 py-2 transition-colors flex items-center justify-between border-0 bg-transparent cursor-pointer"
              style="font-family:'Proeduca Sans',system-ui,sans-serif"
              (click)="selectRol(rol.id)"
              (mouseenter)="$event.currentTarget.style.background='#F8F9FA'"
              (mouseleave)="$event.currentTarget.style.background='transparent'"
            >
              <div>
                <p class="text-sm font-medium" style="color:#1A1A1A">{{ rol.label }}</p>
                <p class="text-xs" style="color:#4B5563">{{ rol.description }}</p>
              </div>
              @if (rolActivo === rol.id) {
                <div
                  class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                  [style.background]="rolColors[rolActivo]?.text"
                ></div>
              }
            </button>
          }
        </div>
      }
    </div>

    <!-- Bell -->
    <button
      class="relative p-2 rounded-lg transition-colors border-0 bg-transparent cursor-pointer"
      (click)="notifClick.emit()"
      (mouseenter)="$event.currentTarget.style.background='#F8F9FA'"
      (mouseleave)="$event.currentTarget.style.background='transparent'"
    >
      <ph-icon name="Bell" [size]="18" style="color:#4B5563" />
      @if (notifCount > 0) {
        <span
          class="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full flex items-center justify-center text-white"
          style="background:#F97316;font-size:10px;font-weight:600"
        >
          {{ notifCount }}
        </span>
      }
    </button>

    <!-- Avatar -->
    <div
      class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-semibold text-black"
      style="background:var(--color-primary-200)"
      title="Ana Lucía Martínez"
    >
      AL
    </div>
  </div>

  <!-- Overlay to close role dropdown on outside click -->
  @if (rolMenuAbierto()) {
    <div class="fixed inset-0 z-40" (click)="rolMenuAbierto.set(false)"></div>
  }
</header>
